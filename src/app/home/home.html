Main Home
<hr>
<div class="navbar-links">

    <a [routerLinkActive]="'active-link'" [routerLink]="['/home']">Main Home</a> 
    @if (!getUserRole()) {
    <a [routerLink]="['/login']"> | Login</a>  
    }

    @if (getUserRole() == admin) {
    <a [routerLinkActive]="'active-link'" [routerLink]="['/admin/home']"> | Admin Home</a>  
    }

    @if (getUserRole() == student) {
    <a [routerLinkActive]="'active-link'" [routerLink]="['/student/home']"> | Student Home</a>
    }

    @if (getUserRole()) {
    <a style="cursor: pointer;" role="button" (click)="logout($event)"> | Logout </a>
    }

</div>
