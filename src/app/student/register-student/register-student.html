<div class="profile-container mat-elevation-z4">
    <mat-card class="profile-card  ">
        <mat-card-header>
            <mat-card-title>Create Student Profile</mat-card-title>
        </mat-card-header>
        <br>
        <mat-card-content>
            <form class="profile-form" [formGroup]="registerForm" (ngSubmit)="onSubmit()">
                <div class="form-row">
                    <mat-form-field appearance="outline">
                        <mat-label>First Name</mat-label>
                        <input formControlName="firstName" matInput placeholder="First Name">
                        <mat-icon matSuffix>person</mat-icon>
                    </mat-form-field>
                </div>
                <div>

                    <mat-form-field appearance="outline">
                        <mat-label>Last Name</mat-label>
                        <input formControlName="lastName" matInput placeholder="Last Name">
                        <mat-icon matSuffix>person</mat-icon>
                    </mat-form-field>
                </div>

                <div>
                    <mat-form-field appearance="outline">
                        <mat-label>Email Address</mat-label>
                        <input matInput type="email" formControlName="email" placeholder="Ex. john@school.com">
                        <mat-icon matSuffix>email</mat-icon>
                    </mat-form-field>
                </div>

                <div>
                    <mat-form-field appearance="outline">
                        <mat-label>Password</mat-label>
                        <input matInput type="password" formControlName="password">
                        <mat-icon matSuffix>password</mat-icon>
                    </mat-form-field>
                </div>

                <div>
                    <mat-form-field appearance="outline">
                        <mat-label>Confirm Passsword</mat-label>
                        <input matInput type="password" formControlName="confirmPassword">
                        <mat-icon matSuffix>password</mat-icon>
                    </mat-form-field>
                </div>

                <div>
                    <mat-form-field appearance="outline">
                        <mat-label>Enrollment Date</mat-label>
                        <!-- type="date" ensures the native browser calendar picker shows up -->
                        <input matInput formControlName="enrollmentDate" type="datetime-local" style="width:100%">
                    </mat-form-field>
                </div>

                <div class="form-actions">
                    <button mat-stroked-button (click)="onReset()" type="button">Cancel</button>
                    <button mat-raised-button [disabled]="registerForm.invalid" color="primary" type="submit">Create
                        Profile</button>
                </div>

            </form>
        </mat-card-content>
    </mat-card>
</div>
