<div class="profile-container mat-elevation-z4">
    <mat-card class="profile-card  ">
        <mat-card-header>
            <mat-card-title>Create Student Profile</mat-card-title>
        </mat-card-header>
        <br>
        <mat-card-content>
            <form class="profile-form">
                <div class="form-row">
                    <mat-form-field appearance="outline">
                        <mat-label>First Name</mat-label>
                        <input matInput placeholder="First Name">
                        <mat-icon matSuffix>person</mat-icon>
                    </mat-form-field>
                </div>
                <div>

                    <mat-form-field appearance="outline">
                        <mat-label>Last Name</mat-label>
                        <input matInput placeholder="LastName">
                        <mat-icon matSuffix>person</mat-icon>
                    </mat-form-field>
                </div>

                <div>
                    <mat-form-field appearance="outline">
                        <mat-label>Email Address</mat-label>
                        <input matInput type="email" placeholder="Ex. john@school.com">
                        <mat-icon matSuffix>email</mat-icon>
                    </mat-form-field>
                </div>

                <div>
                    <mat-form-field appearance="outline">
                        <mat-label>Password</mat-label>
                        <input matInput type="password">
                        <mat-icon matSuffix>password</mat-icon>
                    </mat-form-field>
                </div>
                
                <div>
                    <mat-form-field appearance="outline">
                        <mat-label>Confirm Passsword</mat-label>
                        <input matInput type="password">
                        <mat-icon matSuffix>password</mat-icon>
                    </mat-form-field>
                </div>
                <div class="form-actions">
                    <button mat-stroked-button type="button">Cancel</button>
                    <button mat-raised-button color="primary" type="submit">Create Profile</button>
                </div>

            </form>
        </mat-card-content>
    </mat-card>
</div>
