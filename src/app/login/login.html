<div class="login-container">
    <mat-card class="login-card">

        <!-- Header Section -->
        <mat-card-header>
            <mat-card-title>Welcome Back</mat-card-title>
            <mat-card-subtitle>Sign in to your account to continue</mat-card-subtitle>
        </mat-card-header>

        <mat-card-content>
            <form [formGroup]="loginForm" #form="ngForm" (ngSubmit)="onSubmit()">

                <mat-form-field appearance="outline" class="full-width">
                    <mat-label>Email Address</mat-label>
                    <input matInput placeholder="Enter your Username" formControlName="username">
                    <mat-icon matSuffix>person</mat-icon>
                </mat-form-field>

                <mat-form-field appearance="outline" class="full-width">
                    <mat-label>Password</mat-label>
                    <input matInput type="password" placeholder="Enter your password" formControlName="password">
                    <button mat-icon-button matSuffix type="button">
                        <mat-icon>visibility_off</mat-icon>
                    </button>
                </mat-form-field>

                <button [disabled]="!loginForm.valid" mat-raised-button color="primary" class="full-width submit-btn">
                    <span>Sign In</span>
                </button>
                <div class="navbar-links">
                    <a [routerLinkActive]="'active-link'" (click)="logout($event)" [routerLink]="['/home']">Go Home</a> 
                 </div>


            </form>
        </mat-card-content>

    </mat-card>
</div>
